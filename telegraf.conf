# ─────────────────────────────────────────────────────
#  Telegraf Configuration — TIG Stack
#  Copy .env.example → .env and fill in your values
#  Replace all YOUR_* placeholders before running
# ─────────────────────────────────────────────────────

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "net_monitor"
  timeout = "5s"

[[inputs.snmp]]
  agents = ["YOUR_DEVICE_IP"]       # e.g. 192.168.1.1
  version = 2
  community = "YOUR_SNMP_COMMUNITY" # e.g. public
  interval = "60s"
  timeout = "10s"
  retries = 3

  [[inputs.snmp.field]]
    name = "hostname"
    oid = ".1.3.6.1.2.1.1.5.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "cpu_5min"
    oid = ".1.3.6.1.4.1.9.9.109.1.1.1.1.8.1"

  [[inputs.snmp.field]]
    name = "mem_used"
    oid = ".1.3.6.1.4.1.9.9.48.1.1.1.5.1"
